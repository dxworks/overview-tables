name: Release

on:
  push:
    tags:
      - 'v*'
      - '!*-voyager'

permissions:
  contents: write
  packages: write

jobs:
  parse-tag:
    name: Parse Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Extract semver from tag
        id: semver
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ── Gate (shared dxworks/pipelines workflow, like insider/dude) ──────────────
  # Sets up Java + Node, runs ./scripts/build.sh (which builds the Maven jar and
  # populates ~/.m2 before Trivy scans, so the pom scan resolves offline — no 429).
  gate:
    needs: [parse-tag]
    uses: dxworks/pipelines/.github/workflows/release-gate.yml@v1
    with:
      java-version: '21'
      node-version: '24'
      build-script: ./scripts/build.sh
      trivy-severity: HIGH,CRITICAL
    permissions:
      contents: read
      security-events: write

  # ── NPM (shared dxworks/pipelines workflow — OIDC Trusted Publishing, no token) ──
  # Same mechanism as insider/dude: publishes to GitHub Packages with the built-in
  # token and to npmjs.org via `npm publish --provenance` using the GitHub OIDC token
  # (id-token: write). No NPM_TOKEN secret. build-script builds the Maven jar first.
  npm:
    needs: [parse-tag, gate]
    uses: dxworks/pipelines/.github/workflows/release-npm.yml@v1
    with:
      version: ${{ needs.parse-tag.outputs.version }}
      build-script: ./scripts/build.sh
    permissions:
      contents: read
      packages: write
      id-token: write

  # ── GitHub Release (from dxworks/pipelines release-github.yml, with jar asset) ──
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [parse-tag, npm]
    if: |
      always() &&
      (needs.npm.result == 'success' || needs.npm.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build jar
        run: mvn -q clean package -DskipTests

      - name: Prepare release notes
        run: touch ${{ github.workspace }}/releaseNotes/v${{ needs.parse-tag.outputs.version }}.md

      - name: Create or update GitHub Release
        run: |
          TAG="${{ needs.parse-tag.outputs.tag }}"
          NOTES_FILE="${{ github.workspace }}/releaseNotes/v${{ needs.parse-tag.outputs.version }}.md"
          JAR="${{ github.workspace }}/target/overview-tables.jar"

          ARGS=("$TAG")
          ARGS+=(--title "Tables ${{ needs.parse-tag.outputs.version }}")

          if [ -s "$NOTES_FILE" ]; then
            ARGS+=(--notes-file "$NOTES_FILE")
          else
            ARGS+=(--generate-notes)
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release already exists, uploading asset"
            gh release upload "$TAG" "$JAR" --clobber
          else
            gh release create "${ARGS[@]}" "$JAR"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
