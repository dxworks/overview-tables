name: Release

on:
  push:
    tags:
      - 'v*'
      - '!*-voyager'

permissions:
  contents: write
  packages: write

jobs:
  parse-tag:
    name: Parse Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Extract semver from tag
        id: semver
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ── Gate (from dxworks/pipelines release-gate.yml, with Java for the jar build) ──
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [parse-tag]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'
      - name: Build (Maven jar + npm package)
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'

  # ── NPM (from dxworks/pipelines release-npm.yml, inlined — private repo deploy) ──
  npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [parse-tag, gate]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js (GitHub Packages)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Build (Maven jar + npm package)
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Set package version
        run: npm version ${{ needs.parse-tag.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Determine dist-tag
        id: dist-tag
        run: |
          VERSION="${{ needs.parse-tag.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            TAG_NAME=$(echo "$VERSION" | sed 's/.*-//' | sed 's/\..*//')
            echo "tag=--tag $TAG_NAME" >> $GITHUB_OUTPUT
            echo "Publishing as prerelease with dist-tag: $TAG_NAME"
          else
            echo "tag=" >> $GITHUB_OUTPUT
            echo "Publishing as latest"
          fi

      - name: Publish to GitHub Packages
        run: npm publish ${{ steps.dist-tag.outputs.tag }} || { [ $? -eq 1 ] && npm view . version 2>/dev/null | grep -q "${{ needs.parse-tag.outputs.version }}" && echo "Already published, skipping." || exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Set up Node.js (npmjs.org)
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dxworks'

      - name: Publish to npmjs.org
        run: npm publish --access public ${{ steps.dist-tag.outputs.tag }} || { [ $? -eq 1 ] && npm view . version 2>/dev/null | grep -q "${{ needs.parse-tag.outputs.version }}" && echo "Already published, skipping." || exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release (from dxworks/pipelines release-github.yml, with jar asset) ──
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [parse-tag, npm]
    if: |
      always() &&
      (needs.npm.result == 'success' || needs.npm.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build jar
        run: mvn -q clean package -DskipTests

      - name: Prepare release notes
        run: touch ${{ github.workspace }}/releaseNotes/v${{ needs.parse-tag.outputs.version }}.md

      - name: Create or update GitHub Release
        run: |
          TAG="${{ needs.parse-tag.outputs.tag }}"
          NOTES_FILE="${{ github.workspace }}/releaseNotes/v${{ needs.parse-tag.outputs.version }}.md"
          JAR="${{ github.workspace }}/target/overview-tables.jar"

          ARGS=("$TAG")
          ARGS+=(--title "Tables ${{ needs.parse-tag.outputs.version }}")

          if [ -s "$NOTES_FILE" ]; then
            ARGS+=(--notes-file "$NOTES_FILE")
          else
            ARGS+=(--generate-notes)
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release already exists, uploading asset"
            gh release upload "$TAG" "$JAR" --clobber
          else
            gh release create "${ARGS[@]}" "$JAR"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
