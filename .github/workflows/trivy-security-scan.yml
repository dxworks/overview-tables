name: Trivy Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Copied from dxworks/pipelines trivy-fs-scan.yml (without SARIF upload — requires Advanced Security)
jobs:
  trivy-fs-scan:
    name: Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: MEDIUM,HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'
