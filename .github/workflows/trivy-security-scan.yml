name: Trivy Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

# Inlined rather than the shared dxworks/pipelines trivy-fs-scan.yml so we can
# prime the local Maven cache first: Trivy resolves pom.xml against Maven Central,
# which rate-limits (HTTP 429) shared CI IPs. `mvn dependency:go-offline` makes the
# pom scan resolve from ~/.m2 (reliable). SARIF is still uploaded to the Security tab.
jobs:
  trivy-fs-scan:
    name: Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Prime local Maven repository
        run: mvn -B -q dependency:go-offline

      - name: Run Trivy filesystem scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: MEDIUM,HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'

      - name: Run Trivy filesystem scan (sarif)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          exit-code: 1
          severity: MEDIUM,HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
