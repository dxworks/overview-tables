name: Trivy Daily Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

# Inlined rather than the shared dxworks/pipelines workflow so we can prime the
# local Maven cache first: Trivy resolves pom.xml against Maven Central, which
# rate-limits (HTTP 429) shared CI IPs. Report-only (does not fail); SARIF is
# uploaded to the Security tab.
jobs:
  trivy-fs-scan:
    name: Daily Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Prime local Maven repository
        run: mvn -B -q dependency:go-offline

      - name: Run Trivy filesystem scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: MEDIUM,HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'

      - name: Run Trivy filesystem scan (sarif)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          exit-code: 0
          severity: MEDIUM,HIGH,CRITICAL
          skip-dirs: 'node_modules,dist,target'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
